<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="icon" href="images/Logo Nuevo SAVAL.png"/>
  <link rel="apple-touch-icon" href="images/Logo Nuevo SAVAL.png"/>
  <title>Juegos – SAVAL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: url('images/Fondo.jpeg') center/cover no-repeat; font-family: Arial, Helvetica, sans-serif; }

    #app { position: fixed; width: 768px; height: 1024px; transform-origin: top left; overflow: hidden; }
    .bordes { position: absolute; inset: 0; background: url('images/Bordes.png') center/100% 100% no-repeat; pointer-events: none; z-index: 0; }

    .page {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 36px; padding: 40px;
      position: relative; z-index: 10;
    }

    .logo-saval img {
      height: 110px; object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
    }

    .games-row {
      display: flex; flex-direction: column; gap: 28px; align-items: center;
    }

    .game-card {
      background: rgba(255,255,255,0.93);
      border-radius: 20px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.18);
      padding: 18px 24px;
      display: flex; flex-direction: row;
      align-items: center; gap: 20px;
      text-decoration: none; color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
      width: 100%; max-width: 480px;
    }
    .game-card:hover  { transform: translateY(-5px); box-shadow: 0 14px 44px rgba(0,0,0,0.23); }
    .game-card:active { transform: translateY(-2px); }

    .card-images {
      display: flex; gap: 12px;
      align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-images img {
      height: 80px; object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
    }

    .game-card h2 {
      font-size: 1.25rem; font-weight: bold;
      color: #1a3a6e; text-align: center; flex: 1;
    }

    .btn-play {
      background: #1a3a6e; color: #fff;
      border-radius: 30px; padding: 11px 28px;
      font-size: 1rem; font-weight: bold;
      letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="bordes"></div>
    <div class="page">

      <div class="logo-saval">
        <img src="images/Logo Nuevo SAVAL.png" alt="SAVAL"/>
      </div>

      <div class="games-row">

        <a class="game-card" href="juego1.html">
          <div class="card-images">
            <img src="images/Muxelix ULTRA - Botella y caja.png" alt="Muxelix Ultra"/>
            <img src="images/Energyval (sin fondo) (13).png"     alt="Energyval"/>
          </div>
          <h2>Juego de Memoria</h2>
          <div class="btn-play">Jugar</div>
        </a>

        <a class="game-card" href="sopa.html">
          <div class="card-images">
            <img src="images/Muxelix ULTRA - Botella y caja.png" alt="Muxelix Ultra"/>
            <img src="images/3D Flexival _A iMAGEN .png"         alt="Flexival"/>
          </div>
          <h2>Sopa de Letras</h2>
          <div class="btn-play">Jugar</div>
        </a>

      </div>
    </div>
  </div>

  <script>
    function scaleApp() {
      const W = 768, H = 1024;
      const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
      const app = document.getElementById('app');
      app.style.transform = `scale(${scale})`;
      app.style.left = ((window.innerWidth  - W * scale) / 2) + 'px';
      app.style.top  = ((window.innerHeight - H * scale) / 2) + 'px';
    }
    window.addEventListener('load', scaleApp);
    window.addEventListener('resize', scaleApp);
  </script>
</body>
</html>
